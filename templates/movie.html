<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Result</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Pixelated MS Sans Serif', Arial;
        }

        .window {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
        }

        .window-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .movie-content {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .poster-container {
            flex-shrink: 0;
            width: 160px;
        }

        .poster {
            width: 100%;
            height: auto;
            border: 2px solid #808080;
            border-bottom-color: #ffffff;
            border-right-color: #ffffff;
            border-top-color: #dfdfdf;
            border-left-color: #dfdfdf;
            display: block;
        }

        .info-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .info-panel h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 18px;
            color: #000000;
            padding-bottom: 4px;
            border-bottom: 1px solid #c0c0c0;
        }

        .info-row {
            margin-bottom: 6px;
            font-size: 12px;
        }

        .synopsis-container {
            background: white;
            padding: 10px;
            height: 100px;
            font-family: Arial, Helvetica, sans-serif;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.5;
            margin-top: auto;
            flex-grow: 1;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #dfdfdf;
            box-shadow: inset 0 1px 0 #fff;
        }

        button {
            min-width: 85px;
            font-family: 'Pixelated MS Sans Serif', Arial;
        }
    </style>
</head>

<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">
                <img src="https://win98icons.alexmeub.com/icons/png/video_clip-4.png"
                    style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;" alt="icon">
                Movie Properties
            </div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">

            <div class="movie-content">
                {% if movie.poster_path %}
                <div class="poster-container">
                    <img src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}" alt="Movie Poster" class="poster">
                </div>
                {% endif %}

                <div class="info-panel">
                    <h3>{{ movie.title }}</h3>
                    <div class="info-row">
                        <img src="https://win98icons.alexmeub.com/icons/png/calendar-3.png"
                            style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;" alt="date">
                        <strong>Release:</strong> {{ movie.release_date or 'Unknown' }}
                    </div>
                    <div class="info-row">
                        <img src="https://win98icons.alexmeub.com/icons/png/chm-1.png"
                            style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;" alt="rating">
                        <strong>Rating:</strong> {{ movie.vote_average }} / 10
                    </div>

                    <fieldset style="margin-top: 15px; flex-grow: 1; display: flex; flex-direction: column;">
                        <legend>Synopsis</legend>
                        <div class="sunken-panel synopsis-container">
                            {{ movie.overview or 'No synopsis available.' }}
                        </div>
                    </fieldset>
                </div>
            </div>

            <div class="btn-group">
                <form action="/" method="GET" style="margin: 0;">
                    <button type="submit">Cancel</button>
                </form>
                <form action="/movie" method="GET" style="margin: 0;">
                    <button type="submit" autofocus><strong>OK</strong></button>
                </form>
            </div>

        </div>
    </div>
</body>

</html>
