<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Night</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #000000;
            background-image:
                radial-gradient(white, rgba(255, 255, 255, .2) 2px, transparent 4px),
                radial-gradient(white, rgba(255, 255, 255, .15) 1px, transparent 3px),
                radial-gradient(white, rgba(255, 255, 255, .1) 2px, transparent 4px),
                radial-gradient(rgba(255, 255, 255, .4), rgba(255, 255, 255, .1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px;
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pixelated MS Sans Serif', Arial;
        }

        .window {
            width: 90%;
            max-width: 400px;
            filter: drop-shadow(10px 10px 15px rgba(0, 0, 0, 0.6));
        }

        .window-body {
            padding: 15px;
        }

        .content-area {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
        }

        .icon-placeholder {
            width: 32px;
            height: 32px;
            background-image: url('https://win98icons.alexmeub.com/icons/png/cd_audio_cd_a-3.png');
            background-size: cover;
            flex-shrink: 0;
            border: none;
            background-color: transparent;
        }

        .text-content {
            text-align: left;
            font-size: 12px;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #dfdfdf;
            box-shadow: inset 0 1px 0 #fff;
        }

        a.retro-link {
            color: #000000;
            text-decoration: underline;
            cursor: pointer;
            font-size: 11px;
        }

        button {
            min-width: 85px;
            font-family: 'Pixelated MS Sans Serif', Arial;
        }
    </style>
</head>

<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">MovieGenerator.exe</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <div class="content-area">
                <div class="icon-placeholder"></div>
                <div class="text-content">
                    <p style="margin-top: 0;"><strong>Welcome to Movie Night!</strong></p>
                    <p style="margin-bottom: 0;">Click the button below to initialize the search sequence and fetch a
                        random popular movie for tonight's viewing.</p>
                </div>
            </div>

            <div class="btn-container">
                <a href="/about" class="retro-link" style="margin-right: auto; align-self: center;">Help</a>
                <form action="/movie" method="GET" style="margin: 0;">
                    <button type="submit"><strong>Execute Search</strong></button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
