<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Notepad</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Pixelated MS Sans Serif', Arial;
        }

        .window {
            width: 90%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
        }

        .textarea-container {
            width: 100%;
            height: 230px;
            flex-grow: 1;
            box-sizing: border-box;
            background: #fff;
            padding: 5px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            border: none;
            outline: none;
        }

        .menu-bar {
            border-bottom: 2px solid #dfdfdf;
            padding: 2px 5px;
            display: flex;
            gap: 10px;
            font-size: 12px;
            background: #c0c0c0;
            flex-shrink: 0;
        }

        .menu-bar span {
            cursor: pointer;
        }

        .menu-bar span::first-letter {
            text-decoration: underline;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #dfdfdf;
            background: #c0c0c0;
            padding: 4px 6px;
            font-size: 11px;
            margin-top: 0;
            box-shadow: inset 1px 1px #808080, inset -1px -1px #fff;
            flex-shrink: 0;
        }

        button {
            min-width: 85px;
            font-family: 'Pixelated MS Sans Serif', Arial;
        }
    </style>
</head>

<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">
                <img src="https://win98icons.alexmeub.com/icons/png/notepad-5.png"
                    style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;" alt="icon">
                README.txt - Notepad
            </div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="menu-bar">
            <span>File</span>
            <span>Edit</span>
            <span>Search</span>
            <span>Help</span>
        </div>
        <div class="window-body" style="margin: 0; padding: 2px 2px 0 2px;">
            <textarea class="textarea-container" readonly>
Movie Night
===========

A simple web application to randomly select a movie.

Built specifically for the hackathon slushie grant. Enjoy!

Version: 1.0.0
Year: 1998 (Style)
            </textarea>

            <div class="status-bar">
                <span>Ln 1, Col 1</span>
                <form action="/" method="GET" style="margin: 0;">
                    <button type="submit" style="padding: 0 8px; font-size: 11px;">Close</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
